name: SpecSharp Test Suite

on:
  push:
    branches: [ main, develop, clean-architecture-refactor ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "20.19.0"
  PYTHON_VERSION: "3.11"

jobs:
  backend-acceptance:
    name: Backend Acceptance Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend acceptance contracts
        run: |
          cd backend
          PYTHONPATH=. pytest -q tests/test_v2_acceptance.py

  browser-launch-e2e:
    name: Browser Launch E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install root test dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Prepare backend env for launch E2E
        run: |
          cat > backend/.env <<'EOF'
          DATABASE_URL=sqlite:///./test_specsharp_e2e.db
          SECRET_KEY=test-secret-key
          SESSION_SECRET_KEY=test-session-secret-key
          JWT_SECRET=test-jwt-secret-key
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=development
          FRONTEND_URL=http://localhost:3000
          ALLOW_AUTO_ORG_PROVISIONING=true
          EOF

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend
        env:
          DATABASE_URL: sqlite:///./test_specsharp_e2e.db
          SECRET_KEY: test-secret-key
          SESSION_SECRET_KEY: test-session-secret-key
          JWT_SECRET: test-jwt-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          ENVIRONMENT: development
          FRONTEND_URL: http://localhost:3000
          ALLOW_AUTO_ORG_PROVISIONING: "true"
          TESTING: "true"
        run: |
          mkdir -p tests/reports
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > ../tests/reports/backend-launch-e2e.log 2>&1 &

      - name: Start frontend
        run: |
          cd frontend
          nohup bash -lc "VITE_API_URL=http://127.0.0.1:8001 npm run dev -- --host 127.0.0.1 --port 3000" > ../tests/reports/frontend-launch-e2e.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            curl -sf http://127.0.0.1:8001/health >/dev/null && break
            sleep 1
          done
          for i in {1..60}; do
            curl -sf http://localhost:3000 >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/health >/dev/null
          curl -sf http://localhost:3000 >/dev/null

      - name: Run browser launch E2E suite
        env:
          TEST_BASE_URL: http://localhost:3000
          E2E_API_BASE_URL: http://127.0.0.1:8001
        run: npm run test:e2e

      - name: Upload browser launch artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-launch-e2e-artifacts
          path: |
            tests/reports/playwright-html
            tests/reports/playwright-results
            tests/reports/test-results.json
            tests/reports/backend-launch-e2e.log
            tests/reports/frontend-launch-e2e.log
          retention-days: 7

  deployment-safety-check:
    name: Deployment Safety Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Enforce UI display-only decision guard
        run: bash scripts/testing/guard-ui-display-only.sh

      - name: Build frontend
        run: |
          cd frontend
          npm run build:prod

      - name: Check for test files in build
        run: bash scripts/testing/pre-deploy-check.sh

      - name: Verify no test files in production
        run: |
          if find frontend/dist -type f -name "*.test.*" -o -name "*.spec.*" 2>/dev/null | grep -q .; then
            echo "Test files found in production build"
            exit 1
          fi
          echo "Production build is clean"

      - name: Check build size
        run: |
          echo "Build size report:"
          du -sh frontend/dist
          find frontend/dist -type f -name "*.js" -exec ls -lh {} \; | head -10

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-acceptance, browser-launch-e2e, deployment-safety-check]
    if: always()

    steps:
      - name: Test Results Summary
        run: |
          echo "## Test Suite Summary"
          echo ""
          echo "| Test Suite | Status |"
          echo "|------------|--------|"
          echo "| Backend Acceptance Contracts | ${{ needs.backend-acceptance.result == 'success' && 'Passed' || 'Failed' }} |"
          echo "| Browser Launch E2E | ${{ needs.browser-launch-e2e.result == 'success' && 'Passed' || 'Failed' }} |"
          echo "| Deployment Safety | ${{ needs.deployment-safety-check.result == 'success' && 'Passed' || 'Failed' }} |"
